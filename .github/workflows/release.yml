name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  android-release:
    runs-on: ubuntu-latest
    env:
      APP_VERSION_NAME: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Read app version
        run: |
          VERSION_NAME=$(grep '^APP_VERSION_NAME=' gradle.properties | cut -d'=' -f2)
          echo "APP_VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"

      - name: Validate release tag
        run: |
          if [ "v${APP_VERSION_NAME}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match APP_VERSION_NAME=${APP_VERSION_NAME}"
            exit 1
          fi

      - name: Decode Android signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64" || (echo "Missing ANDROID_KEYSTORE_BASE64 secret" && exit 1)
          test -n "$ANDROID_KEYSTORE_PASSWORD" || (echo "Missing ANDROID_KEYSTORE_PASSWORD secret" && exit 1)
          test -n "$ANDROID_KEY_ALIAS" || (echo "Missing ANDROID_KEY_ALIAS secret" && exit 1)
          test -n "$ANDROID_KEY_PASSWORD" || (echo "Missing ANDROID_KEY_PASSWORD secret" && exit 1)
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release-keystore.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release-keystore.jks" >> "$GITHUB_ENV"
          echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Build release APK
        run: ./gradlew :composeApp:assembleRelease

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          test -f composeApp/build/outputs/apk/release/composeApp-release.apk || (echo "Signed release APK not found" && exit 1)
          cp composeApp/build/outputs/apk/release/composeApp-release.apk release-assets/cosplay2-${APP_VERSION_NAME}.apk
          shasum -a 256 release-assets/cosplay2-${APP_VERSION_NAME}.apk > release-assets/cosplay2-${APP_VERSION_NAME}.apk.sha256

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cosplay2-${{ env.APP_VERSION_NAME }}
          path: release-assets/*

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Cosplay 2 ${{ github.ref_name }}
          files: |
            release-assets/cosplay2-${{ env.APP_VERSION_NAME }}.apk
            release-assets/cosplay2-${{ env.APP_VERSION_NAME }}.apk.sha256
          generate_release_notes: true
